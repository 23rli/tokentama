name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e "const version = require('./package.json').version; const expected = 'v' + version; if (process.env.RELEASE_TAG !== expected) { throw new Error('Tag ' + process.env.RELEASE_TAG + ' does not match package version ' + expected); }"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test
        run: node scripts/smoke.mjs

      - name: Package and checksum
        id: package
        shell: bash
        run: |
          npm run vsce:package
          vsix="$(find . -maxdepth 1 -name '*.vsix' -print -quit)"
          checksum="${vsix%.vsix}.sha256"
          sha256sum "$vsix" > "$checksum"
          echo "vsix=$vsix" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          VSIX: ${{ steps.package.outputs.vsix }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$VSIX" "$CHECKSUM" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Token Lens $GITHUB_REF_NAME" \
            --generate-notes \
            --prerelease \
            --verify-tag
