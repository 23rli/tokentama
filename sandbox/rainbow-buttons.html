<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>17 Rainbow Meme Buttons</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #111;
      font-family: system-ui, sans-serif;
    }
    h1 {
      color: #fff;
      text-align: center;
    }
    .button-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 760px;
      justify-content: center;
      padding: 1rem;
    }
    .meme-btn {
      border: none;
      border-radius: 999px;
      padding: 0.9rem 1.6rem;
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
    }
    .meme-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.55);
    }
    .meme-btn:active {
      transform: translateY(0) scale(0.97);
    }
  </style>
</head>
<body>
  <h1>17 Rainbow Meme Buttons 🌈</h1>
  <div class="button-grid" id="grid"></div>

  <script>
    const grid = document.getElementById("grid");
    const total = 17;
    for (let i = 0; i < total; i++) {
      const hue = Math.round((360 / total) * i);
      const btn = document.createElement("button");
      btn.className = "meme-btn";
      btn.textContent = "Meme " + (i + 1);
      btn.style.backgroundColor = `hsl(${hue}, 90%, 60%)`;
      btn.addEventListener("click", () => {
        btn.textContent = "🎉 " + (i + 1);
      });
      grid.appendChild(btn);
    }
  </script>
</body>
</html>
